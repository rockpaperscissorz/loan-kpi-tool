<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loan KPI Dashboard</title>

  <script src="https://cdn.elliemae.io/elliemae/core/ssf/1.0/elli.ssf.guest-with-polyfill.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    h2 { margin: 0 0 6px; }
    .muted { opacity: 0.75; font-size: 12px; }
    .bar { display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-top: 12px; }
    .btn { padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .pill { padding: 4px 10px; border-radius: 999px; border: 1px solid #ddd; font-size: 12px; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-top: 12px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 14px; background:#fff; }
    .kpi-label { font-size: 12px; opacity: 0.75; margin-bottom: 6px; }
    .kpi-value { font-size: 22px; font-weight: 700; }
    pre { background:#f7f7f7; padding: 10px; border-radius: 10px; overflow:auto; }
    .warn { border: 1px solid #f0c36d; background:#fff7e6; }
    .field { display:flex; flex-direction:column; gap:4px; }
    .input { padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc; }
  </style>
</head>

<body>

<!-- Pipeline KPIs -->
<div class="card">
  <h2>Pipeline KPIs (Folder)</h2>

  <div class="grid">
    <div class="card">
      <div class="field">
        <label class="muted">Folder name</label>
        <input id="pipeFolder" class="input" value="Pipeline" />
      </div>

      <div class="field" style="margin-top:8px;">
        <label class="muted">Limit</label>
        <input id="pipeLimit" class="input" type="number" value="25" />
      </div>
    </div>

    <div class="card warn">
      <div class="kpi-label">Loans Returned</div>
      <div class="kpi-value" id="pipeCount">—</div>
    </div>

    <div class="card warn">
      <div class="kpi-label">Total Loan Amount</div>
      <div class="kpi-value" id="pipeTotal">—</div>
    </div>

    <div class="card warn">
      <div class="kpi-label">By Milestone</div>
      <div id="pipeByStatus">—</div>
    </div>
  </div>
</div>

<pre id="debug"></pre>

<script>
const debugEl = document.getElementById("debug");
const log = (...a) => debugEl.textContent += a.join(" ") + "\n";

async function getUserAccessTokenForApi() {
  const auth = await elli.script.getObject("auth");
  const tok = await auth.getAccessToken();

  if (tok?.access_token) return tok.access_token;

  const resp = await fetch("/api/exchange", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ authCode: tok })
  });

  const json = await resp.json();
  return json.access_token;
}

function buildPipelineFilterFolderOnly() {
  const folder = document.getElementById("pipeFolder").value.trim();
  return {
    operator: "and",
    terms: [{
      canonicalName: "LoanFolder.FolderName",
      value: folder,
      matchType: "exact",
      include: true
    }]
  };
}

async function refreshPipelineKpis() {
  log("Refreshing V3 pipeline…");

  const token = await getUserAccessTokenForApi();
  const limit = Number(document.getElementById("pipeLimit").value || 25);

  const resp = await fetch(
    `https://api.elliemae.com/encompass/v3/loanPipeline?start=0&limit=${limit}`,
    {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        filter: buildPipelineFilterFolderOnly(),
        fields: [
          "Loan.LoanAmount",
          "Loan.MilestoneName",
          "LoanFolder.FolderName"
        ]
      })
    }
  );

  const json = await resp.json();
  log(JSON.stringify(json, null, 2));

  const items = json.items || [];
  let total = 0;
  const byStatus = {};

  for (const l of items) {
    total += Number(l.fields?.["Loan.LoanAmount"] || 0);
    const ms = l.fields?.["Loan.MilestoneName"] || "Unknown";
    byStatus[ms] = (byStatus[ms] || 0) + 1;
  }

  document.getElementById("pipeCount").textContent = items.length;
  document.getElementById("pipeTotal").textContent =
    total.toLocaleString(undefined, { style: "currency", currency: "USD", maximumFractionDigits: 0 });

  document.getElementById("pipeByStatus").textContent =
    Object.entries(byStatus).map(([k,v]) => `${k}: ${v}`).join(" | ") || "—";
}

document.getElementById("btnPipeline")?.addEventListener("click", refreshPipelineKpis);
</script>

</body>
</html>
