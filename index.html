<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pipeline KPI Dashboard</title>

  <script src="https://cdn.elliemae.io/elliemae/core/ssf/1.0/elli.ssf.guest-with-polyfill.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; background:#fafafa; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(12, 1fr); margin-top: 12px; }
    .card { border:1px solid #e6e6e6; border-radius:16px; padding:14px; background:#fff; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .input, select { padding:10px 12px; border-radius:12px; border:1px solid #d8d8d8; min-width:220px; }
    .btn { padding:10px 12px; border-radius:10px; border:1px solid #ccc; background:#fff; cursor:pointer; }
    .btn:disabled { opacity:.6; }
    canvas { width:100%; }
  </style>
</head>

<body>

<div class="card">
  <h2>Pipeline KPI Dashboard</h2>

  <div class="row">
    <select id="folderSelect" class="input" disabled>
      <option>Loading folders…</option>
    </select>

    <select id="loSelect" class="input" disabled>
      <option value="">All LOs</option>
    </select>

    <select id="stateSelect" class="input">
      <option value="">All States</option>
      <option>CT</option><option>MA</option><option>RI</option>
      <option>VT</option><option>NY</option><option>NJ</option>
      <option>PA</option><option>OH</option>
    </select>

    <button id="btnPipeline" class="btn" disabled>Refresh</button>
  </div>
</div>

<div class="grid">
  <div class="card" style="grid-column:span 3">Loans<br><b id="kpiLoans">—</b></div>
  <div class="card" style="grid-column:span 3">Total Volume<br><b id="kpiTotalVol">—</b></div>
  <div class="card" style="grid-column:span 3">Avg Loan<br><b id="kpiAvg">—</b></div>
  <div class="card" style="grid-column:span 3">Unique LOs<br><b id="kpiLoCount">—</b></div>

  <div class="card" style="grid-column:span 6">
    <canvas id="loChart" height="180"></canvas>
  </div>
</div>

<pre id="debug"></pre>

<script>
const API = "https://api.elliemae.com";
const debug = document.getElementById("debug");
const log = (...a) => debug.textContent += a.join(" ") + "\n";

const folderSelect = document.getElementById("folderSelect");
const loSelect = document.getElementById("loSelect");
const stateSelect = document.getElementById("stateSelect");
const btnPipeline = document.getElementById("btnPipeline");

let selectedFolder = null;
let selectedLO = "";
let selectedState = "";
let loInitialized = false;

async function getToken() {
  const auth = await elli.script.getObject("auth");
  const tok = await auth.getAccessToken();
  return tok.access_token || tok;
}

async function loadFolders() {
  const token = await getToken();
  const res = await fetch(`${API}/encompass/v3/loanFolders`, {
    headers: { Authorization:`Bearer ${token}` }
  });
  const json = await res.json();

  const names = [...new Set(json.loanFolders.map(f => f.folderName))];
  folderSelect.innerHTML =
    `<option value="">Select folder…</option>` +
    names.map(n => `<option>${n}</option>`).join("");

  folderSelect.disabled = false;
}

folderSelect.onchange = () => {
  selectedFolder = folderSelect.value;
  btnPipeline.disabled = !selectedFolder;
  loInitialized = false;
  loSelect.innerHTML = `<option value="">All LOs</option>`;
};

loSelect.onchange = () => {
  selectedLO = loSelect.value || "";
  refresh();
};

stateSelect.onchange = () => {
  selectedState = stateSelect.value || "";
  refresh();
};

btnPipeline.onclick = refresh;

function buildFilter() {
  const terms = [];

  if (selectedLO) {
    terms.push({
      canonicalName:"Loan.LoanOfficer.UserId",
      value:selectedLO,
      matchType:"exact",
      include:true
    });
  }

  if (selectedState) {
    terms.push({
      canonicalName:"Fields.12",
      value:selectedState,
      matchType:"exact",
      include:true
    });
  }

  return terms.length ? { operator:"and", terms } : null;
}

async function refresh() {
  if (!selectedFolder) return;

  const token = await getToken();
  const body = {
    loanFolders:[selectedFolder],
    fields:[
      "Loan.LoanAmount",
      "Fields.1612",
      "Fields.317",
      "Fields.12"
    ],
    filter: buildFilter()
  };

  const res = await fetch(`${API}/encompass/v3/loanPipeline`, {
    method:"POST",
    headers:{
      Authorization:`Bearer ${token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify(body)
  });

  const json = await res.json();
  const loans = json.items || [];

  let total = 0;
  const byLO = {};
  const volByLO = {};

  for (const l of loans) {
    const amt = Number(l.fields["Loan.LoanAmount"] || 0);
    const id = l.fields["Fields.317"];
    const name = l.fields["Fields.1612"];

    if (!id) continue;

    total += amt;
    byLO[id] = byLO[id] || { name, count:0 };
    byLO[id].count++;
    volByLO[id] = (volByLO[id] || 0) + amt;
  }

  if (!loInitialized) {
    loSelect.innerHTML =
      `<option value="">All LOs</option>` +
      Object.entries(byLO).map(([id,d]) =>
        `<option value="${id}">${d.name}</option>`
      ).join("");
    loSelect.disabled = false;
    loInitialized = true;
  }

  document.getElementById("kpiLoans").textContent = loans.length;
  document.getElementById("kpiTotalVol").textContent =
    total.toLocaleString("en-US",{style:"currency",currency:"USD"});
  document.getElementById("kpiAvg").textContent =
    loans.length ? (total/loans.length).toFixed(0) : "—";
  document.getElementById("kpiLoCount").textContent =
    Object.keys(byLO).length;
}

(async function init(){
  elli.script.guest.create("", document.head);
  await loadFolders();
})();
</script>
</body>
</html>
