<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pipeline KPI Dashboard</title>

  <!-- SSF guest library -->
  <script src="https://cdn.elliemae.io/elliemae/core/ssf/1.0/elli.ssf.guest-with-polyfill.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    h2 { margin: 0 0 6px; }
    .muted { opacity: 0.75; font-size: 12px; }
    .btn { padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-top: 12px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 14px; background:#fff; }
    .kpi-label { font-size: 12px; opacity: 0.75; margin-bottom: 6px; }
    .kpi-value { font-size: 22px; font-weight: 700; }
    .warn { border: 1px solid #f0c36d; background:#fff7e6; }
    pre { background:#f7f7f7; padding: 10px; border-radius: 10px; overflow:auto; }
  </style>
</head>

<body>

<div class="card">
  <h2>Pipeline KPI Dashboard</h2>
  <div class="muted">
    Folder name resolved via <code>V3 loanFolders</code>. KPIs pulled via <code>V1 loanPipeline</code>.
  </div>

  <div style="margin-top:10px;">
    <button id="btnPipeline" class="btn">Refresh Pipeline KPIs</button>
  </div>
</div>

<div class="grid">
  <div class="card warn">
    <div class="kpi-label">Resolved Folder Name</div>
    <div class="kpi-value" id="pipeFolderName">—</div>
  </div>

  <div class="card warn">
    <div class="kpi-label">Loans Returned</div>
    <div class="kpi-value" id="pipeCount">—</div>
  </div>

  <div class="card warn">
    <div class="kpi-label">Total Loan Amount</div>
    <div class="kpi-value" id="pipeTotal">—</div>
  </div>

  <div class="card warn">
    <div class="kpi-label">By Milestone</div>
    <div id="pipeByStatus">—</div>
  </div>
</div>

<div class="card" style="margin-top:12px;">
  <pre id="debug"></pre>
</div>

<script>
/* ---------------- Logging ---------------- */
const debugEl = document.getElementById("debug");
const log = (...a) => debugEl.textContent += a.join(" ") + "\n";

/* ---------------- Auth (UNCHANGED) ---------------- */
async function getUserAccessTokenForApi() {
  const auth = await elli.script.getObject("auth");
  const tok = await auth.getAccessToken();

  if (tok?.access_token) return tok.access_token;

  const resp = await fetch("/api/exchange", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ authCode: tok })
  });

  const json = await resp.json();
  return json.access_token;
}

/* ---------------- V3: Resolve Folder Name ---------------- */
let resolvedFolderName = null;

// 🔁 Replace this with your actual folder identifier (ID or known key)
const LOAN_FOLDER_ID = "Pipeline";

async function loadFolderNameFromV3() {
  log("Resolving folder name via V3…");

  const token = await getUserAccessTokenForApi();
  const API_SERVER = "https://api.elliemae.com";

  const resp = await fetch(
    `${API_SERVER}/encompass/v3/loanFolders/${LOAN_FOLDER_ID}`,
    {
      headers: { Authorization: `Bearer ${token}` }
    }
  );

  if (!resp.ok) {
    throw new Error(`V3 loanFolders failed (${resp.status})`);
  }

  const json = await resp.json();
  resolvedFolderName = json.folderName;

  document.getElementById("pipeFolderName").textContent = resolvedFolderName;
  log("Resolved folder:", resolvedFolderName);
}

/* ---------------- V1: Pipeline KPIs ---------------- */
function buildPipelineFilter() {
  return {
    operator: "and",
    terms: [{
      canonicalName: "LoanFolder.FolderName",
      value: resolvedFolderName,
      matchType: "exact",
      include: true
    }]
  };
}

async function refreshPipelineKpis() {
  if (!resolvedFolderName) {
    log("Folder name not resolved yet.");
    return;
  }

  log("Refreshing pipeline KPIs…");
  const token = await getUserAccessTokenForApi();

  const resp = await fetch(
    "https://api.elliemae.com/encompass/v1/loanPipeline?limit=500",
    {
      method: "POST",
      headers: {
        Authorization: `Bearer ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        filter: buildPipelineFilter(),
        fields: [
          "Fields.1109",
          "Fields.Log.MS.CurrentMilestone"
        ]
      })
    }
  );

  const json = await resp.json();
  const loans = json.items || [];

  let total = 0;
  const byMilestone = {};

  for (const l of loans) {
    const amt = Number(l.fields?.["Fields.1109"] || 0);
    if (isFinite(amt)) total += amt;

    const ms = l.fields?.["Fields.Log.MS.CurrentMilestone"] || "Unknown";
    byMilestone[ms] = (byMilestone[ms] || 0) + 1;
  }

  document.getElementById("pipeCount").textContent = loans.length;
  document.getElementById("pipeTotal").textContent =
    total.toLocaleString(undefined, { style: "currency", currency: "USD", maximumFractionDigits: 0 });

  document.getElementById("pipeByStatus").textContent =
    Object.entries(byMilestone).map(([k,v]) => `${k}: ${v}`).join(" | ") || "—";

  log("Pipeline KPIs refreshed.");
}

/* ---------------- Init ---------------- */
document.getElementById("btnPipeline").addEventListener("click", refreshPipelineKpis);

(async function init() {
  try {
    await loadFolderNameFromV3();
  } catch (e) {
    log("INIT ERROR:", e.message);
  }
})();
</script>

</body>
</html>
