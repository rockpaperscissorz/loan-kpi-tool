<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loan KPI Tool – Auth Test</title>

  <!-- SSF guest library -->
  <script src="https://cdn.elliemae.io/elliemae/core/ssf/1.0/elli.ssf.guest-with-polyfill.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 14px; margin-top: 12px; }
    button { padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    pre { background: #f7f7f7; padding: 10px; border-radius: 8px; overflow: auto; }
  </style>
</head>

<body>
  <!-- Proof of life -->
  <div class="card" style="border:4px dashed red;">
    <b>PROOF OF LIFE</b><br/>
    Page rendered at: <span id="ts"></span>
  </div>

  <!-- SSF status -->
  <div class="card">
    <b>SSF status:</b> <span id="ssfStatus">Checking…</span>
  </div>

  <!-- Auth test -->
  <div class="card">
    <button id="btnAuth">Get Auth Code</button>
    <div style="margin-top:8px;">
      <b>Auth status:</b> <span id="authStatus">Not started</span>
    </div>

    <details open style="margin-top:10px;">
      <summary>Debug output</summary>
      <pre id="debug"></pre>
    </details>
  </div>

  <script>
    // Timestamp
    document.getElementById("ts").textContent = new Date().toString();

    const debug = document.getElementById("debug");
    function log(msg) {
      debug.textContent += (debug.textContent ? "\n" : "") + msg;
    }

    // SSF check
    const ssfLoaded = (window.elli && elli.script);
    document.getElementById("ssfStatus").textContent = ssfLoaded ? "Loaded ✅" : "NOT loaded ❌";

    document.getElementById("btnAuth").addEventListener("click", async () => {
      if (!ssfLoaded) {
        document.getElementById("authStatus").textContent = "SSF not loaded ❌";
        log("SSF not loaded – cannot request auth.");
        return;
      }

      try {
        document.getElementById("authStatus").textContent = "Requesting auth object…";
        log("Calling elli.script.getObject('auth')…");

        // EXACT pattern you asked for
        var auth = await elli.script.getObject("auth");
        log("Auth object acquired ✅");

        document.getElementById("authStatus").textContent = "Requesting auth code…";
        log("Calling auth.getAccessToken()…");

        var authCode = await auth.getAccessToken();
        log("Auth code returned:");
        log(String(authCode).slice(0, 40) + "…");

        document.getElementById("authStatus").textContent = "Auth code OK ✅";

        // NOTE:
        // This authCode is what you would exchange server-side
        // using your LO Connect Client ID / secret.
      } catch (e) {
        console.error(e);
        document.getElementById("authStatus").textContent = "Auth failed ❌";
        log("ERROR: " + e.message);
      }
    });
  </script>
</body>
</html>
